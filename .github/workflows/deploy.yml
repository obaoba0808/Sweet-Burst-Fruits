name: Deploy Next.js to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      LC_ALL: C.UTF-8
      LANG: C.UTF-8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: nextjs-app/package-lock.json

      - name: Install dependencies
        working-directory: nextjs-app
        run: npm ci

      - name: Build Next.js
        working-directory: nextjs-app
        run: npm run build

      - name: Copy .nojekyll to out/
        run: cp .nojekyll nextjs-app/out/.nojekyll

      - name: Verify critical files in out/
        run: |
          ls -la nextjs-app/out/.nojekyll
          ls nextjs-app/out/_next/static/chunks/webpack-*.js
          ls nextjs-app/out/_next/static/css/*.css
          echo "Total files in out/: $(find nextjs-app/out -type f | wc -l)"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: nextjs-app/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4