name: Deploy Next.js to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: nextjs-app/package-lock.json

      - name: Install dependencies
        working-directory: nextjs-app
        run: npm ci

      - name: Build Next.js
        working-directory: nextjs-app
        env:
          LC_ALL: C.UTF-8
          LANG: C.UTF-8
        run: npm run build

      - name: Copy .nojekyll to out/
        run: cp .nojekyll nextjs-app/out/.nojekyll

      - name: Verify critical files
        run: |
          echo "=== File count ==="
          find nextjs-app/out -type f | wc -l
          echo "=== Critical files ==="
          ls nextjs-app/out/_next/static/chunks/webpack-*.js 2>/dev/null || echo "webpack NOT FOUND"
          ls nextjs-app/out/_next/static/chunks/main-app-*.js 2>/dev/null | head -3
          ls nextjs-app/out/_next/static/css/*.css 2>/dev/null | head -3
          ls nextjs-app/out/images/*.jpg 2>/dev/null | head -3

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./nextjs-app/out
          publish_branch: gh-pages
          cname: ""
          allow_empty_commit: false